body:
  text: 民國丘哌博譯如是我聞一時薄伽梵住波羅奈國夷縣跋打拿鹿野苑中爾時薄伽梵告五和諧比丘眾曰諸比丘乎此二極端為出家行者所宜遠離何等為二一為卑劣粗野世俗無益之放逸一為痛楚卑劣無益之自苦諸比丘乎多陀阿伽陀阿毘三菩陀已覓得中道捨彼兩邊得眼生智馴導至於優婆三昧耶阿毘惹耶三菩陀耶涅槃拿耶諸比丘乎何等為多陀阿伽陀阿毘三菩陀已覓得之中道得眼生智馴導至於優婆三昧耶阿毘惹耶三菩陀耶涅槃拿耶彼即殊勝之八正道耳其名曰正知見正思惟正語正業正生活正精進正念正三摩地諸比丘乎彼即多陀阿伽陀阿毘三菩陀之中道能生眼智馴導至於優婆三昧耶阿毘惹耶三菩陀耶涅槃拿耶諸比丘此苦聖諦者謂生是苦老是苦病是苦死是苦怨憎相逢是苦所愛別離是苦五取蘊熾迅是苦諸比丘此苦之集聖諦者謂從愛故而令相續好樂不離在在貪喜所謂業愛有愛無有愛也諸比丘此苦之滅聖諦者謂於愛凋弊滅一切結割捨解脫棄絕於彼諸比丘乎此順於滅苦之道聖諦者彼即殊勝之八正道耳其名曰正知見正思惟正語正業正生活正精進正念正三摩地一諸比丘乎此苦聖諦未之前聞法也彼於我生眼生智生慧生明生覺諸比丘乎此苦聖諦未之前聞法也應當知曉於我生眼生智生慧生明生覺諸比丘乎此苦聖諦未之前聞法也既知曉已於我生眼生智生慧生明生覺二諸比丘乎此苦之集聖諦未之前聞法也彼於我生眼生智生慧生明生覺諸比丘乎此苦之集聖諦未之前聞法也應當根絕彼於我生眼生智生慧生明生覺諸比丘乎此苦之集聖諦未之前聞法也已根絕竟彼於我生眼生智生慧生明生覺三諸比丘乎此苦之滅聖諦未之前聞法也彼於我生眼生智生慧生明生覺諸比丘乎此苦之滅聖諦未之前聞法也應當親證彼於我生眼生智生慧生明生覺諸比丘乎此苦之滅聖諦未之前聞法也已親證竟彼於我生眼生智生慧生明生覺四諸比丘乎此順於滅苦之道聖諦未之前聞法也彼於我生眼生智生慧生明生覺諸比丘乎此順於滅苦之道聖諦未之前聞法也應當熏修彼於我生眼生智生慧生明生覺諸比丘乎此順於滅苦之道聖諦未之前聞法也既熏修竟彼於我生眼生智生慧生明生覺諸比丘乎我於此四聖諦真智現觀如上三轉十二行相不得畢竟清淨以故久遠以來我則不認我於諸天魔梵沙門婆羅門一切天人眾中證得阿耨多羅三藐三菩提諸比丘乎我於此四聖諦真智現觀如上三轉十二行相已得畢竟清淨者爾乃自認我於諸天魔梵沙門婆羅門一切天人眾中證得阿耨多羅三藐三菩提彼於我生智生視我心解脫不搖矣此世乃吾最末之生極是生後不復後有薄伽梵說竟五比丘皆大歡喜信受奉行大德憍陳如聞此遠離塵垢得法眼淨漏盡意解薄伽梵轉此法輪已地居天吭聲唱言薄伽梵於波羅奈國夷縣跋打拿鹿野苑中轉此無上法輪為諸沙門婆羅門提婆魔梵於此世間所不能轉如是展轉聞於四大王天眾三十三天燄魔天兜率陀天化樂天他化自在天梵眾天梵輔天大梵天少光天無量光天光音天少淨天無量淨天徧淨天廣果天無煩天無熱天善見天善現天乃至色究竟天亦各唱言薄伽梵於波羅奈國夷縣跋打拿鹿野苑中轉此無上法輪為諸沙門婆羅門提婆魔梵於此世間所不能轉須臾之間由梵天起狂吼怒號震動萬系世界一大身光照徧宇內超越諸天所有光明時薄伽梵言友手憍陳如如實知此法憍陳如如實知此法大德憍陳如因之復得號阿若憍陳如
